<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Island Navigator App</title>

<style>
body{
 margin:0;
 background:#07101f;
 color:white;
 font-family:Arial;
}

#bar{
 position:sticky;
 top:0;
 background:#111;
 padding:10px;
 z-index:50;
}

button{
 margin-right:5px;
}

#map{
 position:relative;
 width:1600px;
 height:1100px;
 overflow:hidden;

 background:
 radial-gradient(circle at 20% 20%, rgba(0,255,255,.15), transparent 20%),
 radial-gradient(circle at 80% 70%, rgba(0,255,255,.12), transparent 25%),
 radial-gradient(circle at 60% 40%, rgba(0,200,255,.10), transparent 30%),
 linear-gradient(
 180deg,
 #0f6ea8 0%,
 #0b5f99 20%,
 #094d82 40%,
 #083d69 60%,
 #072f54 80%,
 #05223e 100%
 );
}
.statusDot{
 width:9px;
 height:9px;
 border-radius:50%;
 margin:2px auto 0 auto;
 border:1px solid white;
}

.status-not{background:red;}
.status-done{background:lime;}

#map{
 transform-origin:center center;
 transition:transform .15s linear;
}
